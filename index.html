<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINLESS100 | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --aqua: #00d4ff; --bg: #050a0f; }
        
        /* Custom Cursor */
        body { cursor: none; margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        .cursor { width: 20px; height: 20px; border: 2px solid var(--aqua); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; box-shadow: 0 0 10px var(--aqua); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--aqua); border-radius: 10px; box-shadow: 0 0 10px var(--aqua); }

        .banner { 
            width: 100%; height: 400px; 
            background: url('banner.png') no-repeat center center; 
            background-size: cover; 
            border-bottom: 3px solid var(--aqua);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .banner::before { content: ""; position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 0; }
        
        .profile-area { position: relative; z-index: 1; text-align: center; }
        .logo { width: 160px; height: 160px; border: 3px solid var(--aqua); border-radius: 20px; box-shadow: 0 0 25px var(--aqua); transition: 0.4s; }
        
        h1 { font-family: 'Press Start 2P', cursive; color: var(--aqua); font-size: 1.8rem; margin: 15px 0; text-shadow: 0 0 15px var(--aqua); }
        
        .reveal { opacity: 0; transform: translateY(50px); transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        .card { background: rgba(20, 30, 40, 0.6); padding: 30px; border-radius: 15px; border: 1px solid var(--aqua); margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); transition: 0.4s; }
        .card:hover { box-shadow: 0 0 25px rgba(0, 212, 255, 0.3); transform: translateY(-5px); }
        
        .status-box { display: inline-block; padding: 10px 20px; background: rgba(0, 212, 255, 0.1); border: 1px solid var(--aqua); border-radius: 5px; color: var(--aqua); font-weight: bold; box-shadow: 0 0 10px var(--aqua); }
        .btn { display: block; width: 100%; padding: 20px; background: transparent; border: 2px solid var(--aqua); color: var(--aqua); text-align: center; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 10px; transition: 0.4s; box-shadow: 0 0 10px var(--aqua); }
        .btn:hover { background: var(--aqua); color: black; box-shadow: 0 0 40px var(--aqua); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="cursor"></div>

    <div class="banner">
        <div class="profile-area">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>BRAINLESS100</h1>
            <div class="status-box">Playing Minecraft ⛏️</div>
        </div>
    </div>

    <div class="container">
        <div class="card reveal">
            <h2>📊 YOUTUBE STATS</h2>
            <p><strong>Subscribers:</strong> 1.11k | <strong>Videos:</strong> 109 | <strong>Views:</strong> 40,185</p>
            <p><strong>Joined:</strong> 22 Sept 2022 | <strong>Location:</strong> Nepal</p>
        </div>

        <div class="card reveal">
            <h2>💻 MY SETUP</h2>
            <p>HP Probook | Intel i5 6th Gen | 16GB RAM | 260GB SSD</p>
        </div>

        <a href="https://www.youtube.com/@brainless100" class="btn reveal">VISIT YOUTUBE</a>
        <a href="https://discord.gg/jYuJBSduKh" class="btn reveal">JOIN DISCORD SERVER</a>
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.querySelector('.cursor');
        document.addEventListener('mousemove', e => {
            cursor.setAttribute("style", "top: "+(e.clientY - 10)+"px; left: "+(e.clientX - 10)+"px;");
        });

        // Scroll Animation
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(r => {
                if (r.getBoundingClientRect().top < window.innerHeight - 100) r.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
