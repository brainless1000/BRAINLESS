<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINLESS100 | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --aqua: #00d4ff; --bg: #050a0f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }

        .banner { 
            width: 100%; height: 400px; 
            background: url('banner.png') no-repeat center center; 
            background-size: cover; 
            border-bottom: 5px solid var(--aqua);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative;
        }
        .banner::before { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        
        .profile-area { z-index: 1; text-align: center; }
        .logo { width: 150px; border: 4px solid var(--aqua); border-radius: 15px; box-shadow: 0 0 20px var(--aqua); }
        
        h1 { font-family: 'Press Start 2P', cursive; color: var(--aqua); font-size: 2rem; margin: 15px 0; }
        
        .reveal { opacity: 0; transform: translateY(50px); transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        .card { background: rgba(20, 30, 40, 0.9); padding: 30px; border-radius: 15px; border-left: 5px solid var(--aqua); margin-bottom: 20px; }
        
        .status-box { display: inline-block; padding: 10px 20px; background: #00d4ff22; border: 1px solid var(--aqua); border-radius: 5px; color: var(--aqua); font-weight: bold; }
        .btn { display: block; width: 100%; padding: 20px; background: var(--aqua); color: black; text-align: center; text-decoration: none; font-weight: bold; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--aqua); }
    </style>
</head>
<body>

    <div class="banner">
        <div class="profile-area">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>BRAINLESS100</h1>
            <div class="status-box">Playing Minecraft ⛏️</div>
        </div>
    </div>

    <div class="container">
        <div class="card reveal">
            <h2>📊 YOUTUBE STATS</h2>
            <p><strong>Subscribers:</strong> 1.11k | <strong>Videos:</strong> 109 | <strong>Views:</strong> 40,185</p>
            <p><strong>Joined:</strong> 22 Sept 2022 | <strong>Location:</strong> Nepal</p>
        </div>

        <div class="card reveal">
            <h2>💻 MY SETUP</h2>
            <p>HP Probook | Intel i5 6th Gen | 16GB RAM | 260GB SSD</p>
        </div>

        <div class="card reveal">
            <h2>📧 CONTACT</h2>
            <p><strong>Business Email:</strong> brainless100yt@gmail.com</p>
        </div>

        <a href="https://www.youtube.com/@brainless100" class="btn reveal">VISIT YOUTUBE</a>
        <a href="https://discord.gg/jYuJBSduKh" class="btn reveal">JOIN DISCORD</a>
    </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            reveals.forEach(r => {
                if (r.getBoundingClientRect().top < window.innerHeight - 100) r.classList.add("active");
            });
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
