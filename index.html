<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; line-height: 1.6; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 5%; align-items: center; background: #1e293b; }
        .logo { font-size: 24px; font-weight: bold; color: #38bdf8; }
        
        /* Hero Section */
        .hero { padding: 80px 5%; text-align: center; }
        
        /* Grid Section */
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        
        /* Video Embeds */
        .video-container { width: 100%; height: 200px; background: #000; margin-bottom: 10px; border-radius: 8px; }
        
        button { padding: 10px 20px; background: #38bdf8; border: none; border-radius: 5px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
