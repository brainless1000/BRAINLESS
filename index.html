<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINLESS100 | Official</title>
    <style>
        :root { --aqua: #00d4ff; --bg: #050a0f; --card-bg: rgba(10, 20, 30, 0.8); }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Banner Section */
        .banner { width: 100%; height: 300px; background: linear-gradient(135deg, #00d4ff22, #050a0f); border-bottom: 3px solid var(--aqua); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .banner img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--aqua); box-shadow: 0 0 20px var(--aqua); margin-bottom: 15px; }
        
        .container { max-width: 800px; margin: auto; padding: 20px; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        h1 { font-size: 2.5rem; color: var(--aqua); margin: 10px 0; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; border: 1px solid var(--aqua); text-align: center; }

        .btn { display: block; width: 100%; padding: 18px; margin: 15px 0; background: transparent; border: 2px solid var(--aqua); color: var(--aqua); text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; transition: 0.3s; }
        .btn:hover { background: var(--aqua); color: black; box-shadow: 0 0 20px var(--aqua); }
    </style>
</head>
<body>

    <div class="banner">
        <img src="logo.png" alt="Logo">
        <h1>BRAINLESS100</h1>
        <p>System Playing Minecraft | Content Creator</p>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card reveal"><h3>1,240</h3><p>Subscribers</p></div>
            <div class="card reveal"><h3>313,210</h3><p>Total Views</p></div>
            <div class="card reveal"><h3>87</h3><p>Videos</p></div>
        </div>

        <div class="card reveal">
            <h2>💻 MY SETUP</h2>
            <p><strong>Device:</strong> HP Probook Windows 10</p>
            <p><strong>Specs:</strong> Intel i5 6th Gen | 16GB RAM | 260GB SSD</p>
        </div>

        <div class="reveal">
            <a href="https://www.youtube.com/@brainless100" class="btn">VISIT YOUTUBE CHANNEL</a>
            <a href="https://discord.gg/jYuJBSduKh" class="btn">JOIN DISCORD</a>
        </div>
    </div>

    <script>
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) reveals[i].classList.add("active");
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
