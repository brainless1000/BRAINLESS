<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINLESS100 | Official</title>
    <style>
        :root { --aqua: #00d4ff; --bg: #050a0f; }
        
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--aqua); border-radius: 5px; }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }

        .container { max-width: 800px; margin: auto; padding: 40px 20px; }

        /* Aqua Border Cards */
        .card { 
            background: rgba(20, 30, 40, 0.9); 
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid var(--aqua); 
            margin-bottom: 20px; 
            transition: 0.4s;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .card:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }

        h2 { color: var(--aqua); }

        /* Discord Button Animation */
        .btn { 
            display: block; width: 100%; padding: 20px; margin-top: 15px;
            background: transparent; border: 2px solid var(--aqua); 
            color: var(--aqua); text-align: center; text-decoration: none; 
            font-weight: bold; border-radius: 8px; transition: 0.4s; 
        }
        .btn:hover { background: var(--aqua); color: black; box-shadow: 0 0 30px var(--aqua); }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>📊 YOUTUBE STATS</h2>
            <p><strong>Subscribers:</strong> 1.11k | <strong>Videos:</strong> 109 | <strong>Views:</strong> 40,185</p>
            <p><strong>Joined:</strong> 22 Sept 2022 | <strong>Location:</strong> Nepal</p>
        </div>

        <div class="card">
            <h2>💻 MY SETUP</h2>
            <p>HP Probook | Intel i5 6th Gen | 16GB RAM | 260GB SSD</p>
        </div>

        <a href="https://discord.gg/jYuJBSduKh" class="btn">JOIN DISCORD SERVER</a>
    </div>

</body>
</html>
