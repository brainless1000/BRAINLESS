<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINLESS100 | Portfolio</title>
    <style>
        /* Modern Dark Theme */
        :root { --red: #ff4d4d; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Animation Classes */
        .reveal { opacity: 0; transform: translateY(50px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px; }

        /* Hero */
        .hero { text-align: center; margin-bottom: 100px; }
        .hero h1 { font-size: 4rem; margin: 0; color: var(--red); text-shadow: 0 0 20px rgba(255,77,77,0.3); }

        /* Glass Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        /* Buttons */
        .btn { display: inline-block; padding: 15px 40px; background: var(--red); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--red); }
    </style>
</head>
<body>

<div class="container">
    <div class="hero reveal">
        <h1>BRAINLESS100</h1>
        <p>System Playing Minecraft | Content Creator</p>
    </div>

    <div class="grid">
        <div class="card reveal" style="transition-delay: 0.2s;">
            <h3>1,240</h3><p>Subscribers</p>
        </div>
        <div class="card reveal" style="transition-delay: 0.4s;">
            <h3>313,210</h3><p>Total Views</p>
        </div>
        <div class="card reveal" style="transition-delay: 0.6s;">
            <h3>87</h3><p>Videos</p>
        </div>
    </div>

    <div class="card reveal" style="margin-top: 50px; transition-delay: 0.8s;">
        <h2>💻 MY SETUP</h2>
        <p>HP Probook | Intel i5 6th Gen | 16GB RAM | 260GB SSD</p>
    </div>

    <div style="text-align: center; margin-top: 50px;" class="reveal" style="transition-delay: 1s;">
        <a href="https://www.youtube.com/@brainless100" class="btn" target="_blank">VISIT CHANNEL</a>
    </div>
</div>

<script>
    // Animation logic
    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 150;
            if (elementTop < windowHeight - elementVisible) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
</script>
</body>
</html>
